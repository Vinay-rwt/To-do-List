<div class="auth-container">
    <h2>Register</h2>
  
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="userName" placeholder="yourname" />
        <span class="error" *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched">
          Username is required.
        </span>
      </div>
  
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
        <span class="error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Valid email is required.
        </span>
      </div>
  
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••" />
        <span class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 6 characters.
        </span>
      </div>
  
      <span class="error" *ngIf="errorMessage">{{ errorMessage }}</span>
      <span class="success" *ngIf="successMessage">{{ successMessage }}</span>
  
      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>
  
    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </div>
